<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guilherme Ribeiro</title>
  <link rel="stylesheet" href="style.css" />

  <!-- marked via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

  <header>
    <a href="#/" class="site-name" id="site-name"></a>
    <nav id="nav-links"></nav>
  </header>

  <main id="content">
    <!-- conteúdo markdown renderizado aqui -->
  </main>

  <footer>
    <span id="footer-copy"></span>
    <a href="#/legal">Privacidade-Termos</a>
  </footer>

  <!-- ordem importa: config → ui → 404 → router → app -->
  <script src="config/config.js"></script>
  <script src="src/ui.js"></script>
  <script src="src/404.js"></script>
  <script src="src/router.js"></script>
  <script src="src/app.js"></script>

  <script>
    // Pequenos bindings de config no shell HTML
    document.getElementById("site-name").textContent = CONFIG.site.name;
    document.getElementById("footer-copy").textContent =
      `© ${new Date().getFullYear()} ${CONFIG.site.name}`;
    document.documentElement.lang = CONFIG.site.lang;
  </script>

</body>

</html>

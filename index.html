<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guilherme Ribeiro</title>
  <meta name="description"
    content="Portfolio de Guilherme Ribeiro, desenvolvedor JavaScript e Python focado em soluções simples e back-ends enxutos.">
  <meta property="og:title" content="Guilherme Ribeiro — Desenvolvedor JavaScript & Python">
  <meta property="og:description"
    content="Portfolio de Guilherme Ribeiro, desenvolvedor JavaScript e Python focado em soluções simples e back-ends enxutos.">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="window">

    <header class="titlebar">
      <span class="site-name">Guilherme Ribeiro</span>
      <button id="menuToggle" class="menu-toggle" aria-label="Abrir menu">☰</button>
    </header>

    <div class="layout">

      <aside class="sidebar" id="sidebar">
        <p class="sidebar-label"></p>
        <nav id="fileTree" class="file-tree" aria-label="Navegação de seções"></nav>
        <button id="legalBtn" class="legal-link">Privacidade · Termos</button>
      </aside>

      <main id="content" class="content" aria-live="polite">
        <div style="text-align: left;">
          <img style="width: 25%; border-radius: 50%;" src="./assets/photo.png">
        </div>
      </main>

    </div>

    <footer class="statusbar">
      <span>© 2026 Guilherme Ribeiro</span>
      <span class="dot">•</span>
      <button id="legalBtnFooter">Privacidade · Termos</button>
    </footer>

  </div>

  <div id="modal" class="modal hidden" role="dialog" aria-modal="true" aria-label="Documento legal">
    <div class="modal-card">
      <button id="modalClose" class="modal-close" aria-label="Fechar">×</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script src="marked.min.js"></script>
  <script src="app.js"></script>
  <script src="ui.js"></script>
</body>

</html>
